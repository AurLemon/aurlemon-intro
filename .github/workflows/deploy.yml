name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      baseline_existing_db:
        description: 'Mark existing migrations as already applied before deploy (use only for the first deploy to an existing database)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SSH_HOST: ${{ secrets.BACKEND_DEPLOY_HOST }}
      SSH_PORT: ${{ secrets.BACKEND_DEPLOY_SSH_PORT || '233' }}
      SSH_USER: ${{ secrets.BACKEND_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.BACKEND_DEPLOY_SSH_PRIVATE_KEY }}
      REMOTE_DEPLOY_PATH: ${{ secrets.BACKEND_REMOTE_DEPLOY_PATH || '/www/wwwroot/aurlemon-intro' }}
      REMOTE_TEMP_DIR: /tmp/deploy-${{ github.run_id }}-${{ github.run_attempt }}
      PM2_APP_NAME: ${{ secrets.BACKEND_PM2_APP_NAME }}
      # COS secrets example:
      # ARTIFACT_BUCKET=aurintro-artifact-1254268741
      # ARTIFACT_UPLOAD_ENDPOINT=cos.accelerate.myqcloud.com
      # ARTIFACT_DOWNLOAD_ENDPOINT=cos.accelerate.myqcloud.com
      # ARTIFACT_REGION=ap-guangzhou
      # Notes:
      # 1) endpoint must be host only (no protocol, no bucket prefix).
      # 2) upload/download can be the same endpoint.
      # 3) regional endpoint alternative: cos.ap-guangzhou.myqcloud.com
      ARTIFACT_BUCKET: ${{ secrets.ARTIFACT_BUCKET }}
      ARTIFACT_UPLOAD_ENDPOINT: ${{ secrets.ARTIFACT_UPLOAD_ENDPOINT }}
      ARTIFACT_DOWNLOAD_ENDPOINT: ${{ secrets.ARTIFACT_DOWNLOAD_ENDPOINT }}
      ARTIFACT_REGION: ${{ secrets.ARTIFACT_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.COS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.COS_SECRET_ACCESS_KEY }}
      DEPLOY_RUNTIME_ENV: ${{ secrets.DEPLOY_RUNTIME_ENV }}

    steps:
      - uses: actions/checkout@v4

      # --------------------
      # Build app
      # --------------------
      - name: Build app in Docker
        run: |
          docker run --rm \
            -e DEPLOY_RUNTIME_ENV="$DEPLOY_RUNTIME_ENV" \
            -v "$GITHUB_WORKSPACE":/app \
            -w /app \
            node:24-bookworm \
            bash -lc '
              set -e
              corepack enable
              corepack prepare pnpm@10.14.0 --activate
              pnpm install --frozen-lockfile
              pnpm exec prisma generate

              if [ -n "$DEPLOY_RUNTIME_ENV" ]; then
                printf "%s\n" "$DEPLOY_RUNTIME_ENV" > .env
              fi

              pnpm build

              rm -rf /app/deploy-artifact
              mkdir -p /app/deploy-artifact

              cp /app/package.json /app/pnpm-lock.yaml /app/deploy-artifact/
              cp -R /app/prisma /app/deploy-artifact/prisma
              cp -R /app/.output/public \
                    /app/.output/server \
                    /app/deploy-artifact/
              mkdir -p /app/deploy-artifact/server/data
              cp -R /app/data/ip2region /app/deploy-artifact/server/data/
              cp /app/.output/nitro.json /app/deploy-artifact/nitro.json

              if [ -f /app/.env ]; then
                cp /app/.env /app/deploy-artifact/.env
              fi

              pnpm install --prod --frozen-lockfile --dir /app/deploy-artifact

              test -f /app/deploy-artifact/package.json
              test -f /app/deploy-artifact/prisma/schema.prisma
              test -f /app/deploy-artifact/prisma/migrations/migration_lock.toml
              test -f /app/deploy-artifact/node_modules/.bin/prisma
            '

      # --------------------
      # Install COSCMD
      # --------------------
      - name: Install COSCMD
        run: python3 -m pip install -U coscmd

      # --------------------
      # Prepare SSH (ControlMaster)
      # --------------------
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh/cm
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

          cat >> ~/.ssh/config <<EOF
          Host deploy-host
            HostName $SSH_HOST
            User $SSH_USER
            Port $SSH_PORT
            IdentityFile ~/.ssh/deploy_key
            ControlMaster auto
            ControlPersist 5m
            ControlPath ~/.ssh/cm/%r@%h:%p
            ServerAliveInterval 10
            ServerAliveCountMax 3
            ConnectTimeout 30
          EOF

      # --------------------
      # Warm up SSH
      # --------------------
      - name: Warm up SSH connection
        run: |
          ssh deploy-host "echo SSH warmup OK"

      # --------------------
      # Create remote temp dir
      # --------------------
      - name: Create remote temp dir
        run: |
          ssh deploy-host "mkdir -p '$REMOTE_TEMP_DIR'"

      # --------------------
      # Pack deploy artifact
      # --------------------
      - name: Pack deploy artifact
        run: |
          tar -czf deploy-artifact.tar.gz -C deploy-artifact .

      # --------------------
      # Upload to COS artifact bucket
      # --------------------
      - name: Upload deploy artifact
        run: |
          set -euo pipefail
          echo "Configuring COS client..."
          coscmd config -a "$AWS_ACCESS_KEY_ID" -s "$AWS_SECRET_ACCESS_KEY" -b "$ARTIFACT_BUCKET" -e "$ARTIFACT_UPLOAD_ENDPOINT" -m 20 --retry 10 --timeout 120
          echo "Cleaning artifact prefix app/ ..."
          coscmd delete -r --yes app/ || true
          echo "Uploading deploy artifact to app/deploy-artifact-${{ github.run_id }}.tar.gz ..."
          coscmd upload --yes deploy-artifact.tar.gz "app/deploy-artifact-${{ github.run_id }}.tar.gz"
          echo "Upload finished."

      # --------------------
      # Deploy on remote
      # --------------------
      - name: Deploy app on remote host
        run: |
          ssh deploy-host \
            "export AWS_ACCESS_KEY_ID='$AWS_ACCESS_KEY_ID' \
            AWS_SECRET_ACCESS_KEY='$AWS_SECRET_ACCESS_KEY' \
            ARTIFACT_BUCKET='$ARTIFACT_BUCKET' \
            ARTIFACT_DOWNLOAD_ENDPOINT='$ARTIFACT_DOWNLOAD_ENDPOINT' \
            ARTIFACT_REGION='$ARTIFACT_REGION' \
            REMOTE_DEPLOY_PATH='$REMOTE_DEPLOY_PATH' \
            REMOTE_TEMP_DIR='$REMOTE_TEMP_DIR' \
            PM2_APP_NAME='$PM2_APP_NAME' \
            DEPLOY_RUNTIME_ENV='$DEPLOY_RUNTIME_ENV' \
            BASELINE_EXISTING_DB='${{ github.event.inputs.baseline_existing_db || 'false' }}'; bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$REMOTE_DEPLOY_PATH"

          coscmd config -a "$AWS_ACCESS_KEY_ID" -s "$AWS_SECRET_ACCESS_KEY" -b "$ARTIFACT_BUCKET" -e "$ARTIFACT_DOWNLOAD_ENDPOINT" -m 20 --retry 10 --timeout 120
          rm -f "$REMOTE_TEMP_DIR/deploy-artifact.tar.gz"
          coscmd download -f "app/deploy-artifact-${{ github.run_id }}.tar.gz" "$REMOTE_TEMP_DIR/deploy-artifact.tar.gz"

          rm -rf "$REMOTE_TEMP_DIR/extracted"
          mkdir -p "$REMOTE_TEMP_DIR/extracted"
          tar -xzf "$REMOTE_TEMP_DIR/deploy-artifact.tar.gz" -C "$REMOTE_TEMP_DIR/extracted"

          if [ -n "$DEPLOY_RUNTIME_ENV" ]; then
            printf "%s\n" "$DEPLOY_RUNTIME_ENV" > "$REMOTE_DEPLOY_PATH/.env"
          fi

          rsync -a --no-owner --no-group --delete --exclude='.env' --exclude='sqlite.db' \
            "$REMOTE_TEMP_DIR/extracted/" \
            "$REMOTE_DEPLOY_PATH/"

          cd "$REMOTE_DEPLOY_PATH"

          if [ -f ./.env ]; then
            set -a
            source <(sed 's/\r$//' ./.env)
            set +a
          fi

          if [ "$BASELINE_EXISTING_DB" = "true" ]; then
            pnpm prisma migrate resolve --applied 20250202232641_init
            pnpm prisma migrate resolve --applied 20260405000000_social_features
            pnpm prisma migrate resolve --applied 20260406132000_message_comment_pin
          fi

          pnpm db:migrate:deploy

          if pm2 describe "$PM2_APP_NAME" >/dev/null 2>&1; then
            pm2 restart "$PM2_APP_NAME" --update-env
          else
            pm2 start "$REMOTE_DEPLOY_PATH/.output/server/index.mjs" --name "$PM2_APP_NAME" --cwd "$REMOTE_DEPLOY_PATH"
          fi

          rm -rf "$REMOTE_TEMP_DIR"
          EOF
